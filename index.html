<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
       
        <div class="header">
            <h1>💰 Expense Tracker</h1>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">Income</div>
                    <div class="stat-value income-color" id="totalIncome">₹0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Expenses</div>
                    <div class="stat-value expense-color" id="totalExpense">₹0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Balance</div>
                    <div class="stat-value balance-color" id="totalBalance">₹0</div>
                </div>
            </div>
        </div>

       
        <div class="form-section">
            <form id="transactionForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" placeholder="e.g., Salary, Groceries" required>
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="type">Type</label>
                        <select id="type" required>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Add Transaction</button>
            </form>
        </div>

       
        <div class="transactions-section">
            <h2>Transactions</h2>
            <div id="transactionList" class="transaction-list">
                <div class="empty-state">
                    <p>No transactions yet. Add one to get started!</p>
                </div>
            </div>
        </div>
    </div>

    <script type = "module" src="app.js"></script>
</body>
</html>
